
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trend Pulse | Intelligence Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: "var(--background)", 
              text: "var(--text)",
              spark: { DEFAULT: "#FF7E5F", glow: "#FEB47B" },
              pulse: { DEFAULT: "#00F0FF", glow: "#57FFFF" },
              surge: { DEFAULT: "#BD00FF", glow: "#D65CFF" },
            },
            fontFamily: {
              sans: ['SF Pro Display', 'Inter', 'system-ui', 'sans-serif'],
              mono: ['SF Mono', 'JetBrains Mono', 'monospace'],
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --background: #020205; 
        --text: #F5F5F7;
      }
      body {
        background-color: var(--background);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      /* REFINED OBSIDIAN GLASS */
      .glass-high {
        background: rgba(15, 15, 25, 0.4);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
          0 25px 50px -12px rgba(0, 0, 0, 0.7),
          inset 0 1px 1px rgba(255, 255, 255, 0.15);
      }
      .neon-capsule {
        box-shadow: 0 0 15px currentColor;
      }
      .mask-gradient-b {
        mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .perspective-1000 { perspective: 1000px; }
      
      /* COMMAND BAR GLOW */
      .shadow-pulse-10 {
        box-shadow: 0 0 50px rgba(0, 240, 255, 0.1), 0 40px 80px -20px rgba(0,0,0,0.9);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
        "framer-motion": "https://aistudiocdn.com/framer-motion@^11.13.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="overflow-hidden selection:bg-pulse/30">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
